spring.application.name=API-Tableaux
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:10057/tableau_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:10058/tableau_db}
spring.data.mongodb.username=${SPRING_DATASOURCE_USERNAME:root}
spring.data.mongodb.password=${SPRING_DATASOURCE_PASSWORD:root}

security.jwt.secret-key=edc0c2ea99387d88f8bea095099ba9a90ac194796414375885c77d59ca850c68
security.jwt.expiration-time=3600000

# Configuration OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
